# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stage11-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stage11-app
  template:
    metadata:
      labels:
        app: stage11-app
    spec:
      containers:
        - name: stage11-app
          image: stage11-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: stage11-service
spec:
  selector:
    app: stage11-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30800
  type: NodePort